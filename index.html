<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/p2p_mobile/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="SmartExchange – Money Changer Mobile">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SmartExchange">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SmartExchange</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    #loading {
      text-align: center;
      padding: 1rem;
      z-index: 0;
    }
    #loading.hidden,
    #fallback.hidden {
      display: none;
    }
    #fallback {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      right: 1rem;
      text-align: center;
      font-size: 0.875rem;
      color: rgba(248, 250, 252, 0.8);
    }
    flutter-view {
      display: block;
      width: 100%;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="loading" aria-live="polite">Loading SmartExchange…</div>
  <div id="fallback" class="hidden" aria-live="polite">If the app does not appear, use a modern browser with JavaScript and WebGL enabled.</div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loading = document.getElementById('loading');
        if (loading) loading.classList.add('hidden');
        var fallback = document.getElementById('fallback');
        if (fallback) fallback.classList.remove('hidden');
      }, 4000);
    });
  </script>
</body>
</html>
